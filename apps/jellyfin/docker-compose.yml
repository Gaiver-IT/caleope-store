services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    env_file:
      - {{$.BaseDir}}/app-config/jellyfin/app.env
    environment:
      - JELLYFIN_PublishedServerUrl=https://{{.Domain}}
    ports:
      {{- range .Ports}}
      - "{{.Host}}:{{.Container}}"
      {{- end}}
    volumes:
      {{- range .Volumes}}
      - {{$.BaseDir}}/{{.Source}}:{{.Target}}
      {{- end}}
      # Médias arr-stack (si installé) — lecture seule pour Jellyfin
      - {{$.BaseDir}}/app-data/arr-stack/data/media:/arr-media:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`{{.Domain}}`)"
      - "traefik.http.routers.jellyfin.entrypoints=web"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.docker.network=caleope-public"
      - "traefik.http.routers.jellyfin.middlewares=${CALEOPE_AUTH_MIDDLEWARE}"
    networks:
      - caleope-public
  # ── BOOTSTRAP — complète le wizard Jellyfin au 1er démarrage ───────
  jellyfin-bootstrap:
    image: alpine:3.19
    container_name: jellyfin-bootstrap
    restart: "no"
    dns_search: []
    command: ["/bin/sh", "-c", "printf 'nameserver 127.0.0.11\\noptions ndots:0\\n' > /etc/resolv.conf && apk add --no-cache curl bash >/dev/null 2>&1 && bash /bootstrap.sh"]
    volumes:
      - {{.BaseDir}}/app-config/jellyfin/bootstrap.sh:/bootstrap.sh:ro
    networks:
      - caleope-public
    depends_on:
      - jellyfin

networks:
  caleope-public:
    external: true
