services:
  homarr:
    image: ghcr.io/ajnart/homarr:latest
    container_name: homarr
    restart: unless-stopped
    env_file:
      - ${CALEOPE_APP_CONFIG}/homarr/secrets.env
    ports:
      - "${HOMARR_PORT_WEB:-7575}:7575"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CALEOPE_APP_DATA}/homarr/data:/app/data
      - ${CALEOPE_APP_DATA}/homarr/configs:/app/public/custom-icons
    networks:
      - caleope-public
      - caleope-internal

networks:
  caleope-public:
    external: true
  caleope-internal:
    external: true
