services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
      - app.env
      - {{.BaseDir}}/app-config/{{.AppID}}/secrets.env
    volumes:
      - {{.BaseDir}}/app-data/vaultwarden/data:/data
      - {{.BaseDir}}/app-config/{{.AppID}}/ca-bundle.pem:/etc/ssl/certs/ca-certificates.crt:ro
    {{- range .Ports}}
    ports:
      - "{{.Host}}:{{.Container}}"
    {{- end}}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`{{.Domain}}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=web"
      - "traefik.http.routers.vaultwarden.service=vaultwarden"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.docker.network=caleope-public"
      - "traefik.http.routers.vaultwarden-ws.rule=Host(`{{.Domain}}`) && Path(`/notifications/hub`)"
      - "traefik.http.routers.vaultwarden-ws.entrypoints=web"
      - "traefik.http.routers.vaultwarden-ws.service=vaultwarden-ws"
      - "traefik.http.services.vaultwarden-ws.loadbalancer.server.port=3012"
    networks:
      - caleope-public

  vaultwarden-ak-proxy:
    image: python:3-alpine
    container_name: vaultwarden-ak-proxy
    restart: unless-stopped
    command: python /authentik-proxy.py
    environment:
      - AK_PORT=9000
      - AK_DOMAIN=${AUTHENTIK_DOMAIN}
    volumes:
      - {{.BaseDir}}/app-config/{{.AppID}}/authentik-proxy.py:/authentik-proxy.py:ro
    networks:
      - caleope-public

networks:
  caleope-public:
    external: true
