services:
  memos:
    image: neosmemo/memos:stable
    container_name: memos
    restart: unless-stopped
    env_file:
      - ${CALEOPE_BASE_DIR}/app-config/memos/secrets.env
    ports:
      - "${MEMOS_PORT_WEB:-5230}:5230"
    volumes:
      - ${CALEOPE_BASE_DIR}/app-data/memos/data:/var/opt/memos
    networks:
      - caleope-public
      - caleope-internal

networks:
  caleope-public:
    external: true
  caleope-internal:
    external: true
