services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    env_file:
      - ${CALEOPE_BASE_DIR}/app-config/n8n/secrets.env
    ports:
      - "${CALEOPE_PORT_WEB}:5678"
    volumes:
      - ${CALEOPE_BASE_DIR}/app-data/n8n/data:/home/node/.n8n
    networks:
      - caleope-public
      - caleope-internal

networks:
  caleope-public:
    external: true
  caleope-internal:
    external: true
