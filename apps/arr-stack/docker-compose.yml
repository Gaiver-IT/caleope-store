##
## ARR STACK — Prowlarr + Radarr + Sonarr + Lidarr + Bazarr
##             + qBittorrent + SABnzbd + Jellyseerr + Jellyfin Vue [+ Jellyfin]
##             + FlareSolverr (bypass Cloudflare pour Prowlarr)
##
## Profils Docker Compose (combinables) :
##   novpn     → qBittorrent sans VPN
##   vpn       → qBittorrent derrière Gluetun
##   jellyfin  → Jellyfin inclus dans la stack
##
## COMPOSE_PROFILES est écrit dans secrets.env par setup.sh
## ex: COMPOSE_PROFILES=vpn,jellyfin
##
## Routage : chaque service est exposé sur un sous-domaine
##   Jellyseerr   → jellyseerr.{{.Domain}}    (demandes de contenu)
##   Radarr       → radarr.{{.Domain}}
##   Sonarr       → sonarr.{{.Domain}}
##   Lidarr       → lidarr.{{.Domain}}
##   Bazarr       → bazarr.{{.Domain}}
##   Prowlarr     → prowlarr.{{.Domain}}
##   qBittorrent  → qbt.{{.Domain}}
##   SABnzbd      → sabnzbd.{{.Domain}}
##   Jellyfin     → jellyfin.{{.Domain}}
##   Jellyfin Vue → vue.{{.Domain}}
##   FlareSolverr → interne seulement (http://arr-flaresolverr:8191)
##

services:

  # ── JELLYSEERR — UI de demande de contenu ───────────────────────────
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    dns_search: []
    # Fix DNS search domain hérité du host (guernaham.bzh → IP publique Traefik)
    # sans ce fix, Jellyseerr ne peut pas joindre 'jellyfin' en interne
    command: ["/bin/sh", "-c", "printf 'nameserver 127.0.0.11\\noptions ndots:0\\n' > /etc/resolv.conf 2>/dev/null || true; npm start"]
    environment:
      - TZ=${ARR_TZ}
      - LOG_LEVEL=info
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/jellyseerr:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.{{.Domain}}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=web"
      - "traefik.http.routers.jellyseerr.priority=10"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── JELLYFIN — serveur multimédia (profil: jellyfin) ────────────────
  # Activé si Jellyfin n'est pas déjà installé séparément.
  # Les bibliothèques sont configurées automatiquement par le bootstrap.
  jellyfin:
    profiles: [jellyfin]
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    dns_search: []
    # extra_hosts : résout le domaine Authentik vers host-gateway pour éviter le hairpin NAT
    # (Jellyfin serveur doit joindre Authentik pour valider les tokens OIDC)
    extra_hosts:
      - "${ARR_AK_DOMAIN:-authentik.placeholder}:host-gateway"
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.{{.Domain}}
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/jellyfin:/config
      - {{.BaseDir}}/app-data/arr-stack/config/jellyfin-cache:/cache
      - {{.BaseDir}}/app-data/arr-stack/data/media:/media:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin-srv.rule=Host(`jellyfin.{{.Domain}}`)"
      - "traefik.http.routers.jellyfin-srv.entrypoints=web"
      - "traefik.http.routers.jellyfin-srv.priority=10"
      - "traefik.http.services.jellyfin-srv.loadbalancer.server.port=8096"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── PROWLARR — gestion des indexeurs ────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    dns_search: []
    environment:
      - PUID=${ARR_PUID}
      - PGID=${ARR_PGID}
      - TZ=${ARR_TZ}
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/prowlarr:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.{{.Domain}}`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.routers.prowlarr.priority=10"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── RADARR — films ──────────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    dns_search: []
    environment:
      - PUID=${ARR_PUID}
      - PGID=${ARR_PGID}
      - TZ=${ARR_TZ}
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/radarr:/config
      - {{.BaseDir}}/app-data/arr-stack/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.{{.Domain}}`)"
      - "traefik.http.routers.radarr.entrypoints=web"
      - "traefik.http.routers.radarr.priority=10"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── SONARR — séries TV ──────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    dns_search: []
    environment:
      - PUID=${ARR_PUID}
      - PGID=${ARR_PGID}
      - TZ=${ARR_TZ}
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/sonarr:/config
      - {{.BaseDir}}/app-data/arr-stack/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.{{.Domain}}`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
      - "traefik.http.routers.sonarr.priority=10"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── LIDARR — musique ────────────────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    dns_search: []
    environment:
      - PUID=${ARR_PUID}
      - PGID=${ARR_PGID}
      - TZ=${ARR_TZ}
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/lidarr:/config
      - {{.BaseDir}}/app-data/arr-stack/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.{{.Domain}}`)"
      - "traefik.http.routers.lidarr.entrypoints=web"
      - "traefik.http.routers.lidarr.priority=10"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── READARR — livres (désactivé : image sans support amd64 fiable) ──
  # Pour l'activer manuellement, ajouter :
  #   image: lscr.io/linuxserver/readarr:develop
  #   + configurer manuellement via l'interface Prowlarr

  # ── BAZARR — sous-titres ────────────────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    dns_search: []
    environment:
      - PUID=${ARR_PUID}
      - PGID=${ARR_PGID}
      - TZ=${ARR_TZ}
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/bazarr:/config
      - {{.BaseDir}}/app-data/arr-stack/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.{{.Domain}}`)"
      - "traefik.http.routers.bazarr.entrypoints=web"
      - "traefik.http.routers.bazarr.priority=10"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── QBITTORRENT SANS VPN (profil: novpn) ────────────────────────────
  qbittorrent:
    profiles: [novpn]
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    dns_search: []
    environment:
      - PUID=1000
      - PGID=${ARR_PGID}
      - TZ=${ARR_TZ}
      - WEBUI_PORT=8080
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/qbittorrent:/config
      - {{.BaseDir}}/app-data/arr-stack/data/downloads:/data/downloads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbt.rule=Host(`qbt.{{.Domain}}`)"
      - "traefik.http.routers.qbt.entrypoints=web"
      - "traefik.http.routers.qbt.priority=10"
      - "traefik.http.services.qbt.loadbalancer.server.port=8080"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── GLUETUN — tunnel VPN (profil: vpn) ─────────────────────────────
  arr-gluetun:
    profiles: [vpn]
    image: qmcgaw/gluetun:latest
    container_name: arr-gluetun
    restart: unless-stopped
    dns_search: []
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${ARR_VPN_PROVIDER}
      - VPN_TYPE=${ARR_VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${ARR_VPN_WG_PRIVATE_KEY:-}
      - WIREGUARD_ADDRESSES=${ARR_VPN_WG_ADDRESSES:-}
      - OPENVPN_USER=${ARR_VPN_OPENVPN_USER:-}
      - OPENVPN_PASSWORD=${ARR_VPN_OPENVPN_PASSWORD:-}
      - SERVER_COUNTRIES=${ARR_VPN_SERVER_COUNTRIES:-}
      - FIREWALL_OUTBOUND_SUBNETS=172.0.0.0/8,10.0.0.0/8,192.168.0.0/16
      - FIREWALL_INPUT_PORTS=8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbt.rule=Host(`qbt.{{.Domain}}`)"
      - "traefik.http.routers.qbt.entrypoints=web"
      - "traefik.http.routers.qbt.priority=10"
      - "traefik.http.services.qbt.loadbalancer.server.port=8080"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── QBITTORRENT AVEC VPN (profil: vpn) ─────────────────────────────
  qbittorrent-vpn:
    profiles: [vpn]
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    dns_search: []
    network_mode: "service:arr-gluetun"
    depends_on:
      - arr-gluetun
    environment:
      - PUID=1000
      - PGID=${ARR_PGID}
      - TZ=${ARR_TZ}
      - WEBUI_PORT=8080
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/qbittorrent:/config
      - {{.BaseDir}}/app-data/arr-stack/data/downloads:/data/downloads

  # ── SABNZBD — client Usenet ─────────────────────────────────────────
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    dns_search: []
    environment:
      - PUID=${ARR_PUID}
      - PGID=${ARR_PGID}
      - TZ=${ARR_TZ}
    volumes:
      - {{.BaseDir}}/app-data/arr-stack/config/sabnzbd:/config
      - {{.BaseDir}}/app-data/arr-stack/data/downloads:/data/downloads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.{{.Domain}}`)"
      - "traefik.http.routers.sabnzbd.entrypoints=web"
      - "traefik.http.routers.sabnzbd.priority=10"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - arr-internal

  # ── FLARESOLVERR — bypass Cloudflare pour Prowlarr ──────────────────
  # Accessible uniquement en interne : http://arr-flaresolverr:8191
  # Prowlarr l'utilise automatiquement pour les indexeurs protégés.
  arr-flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: arr-flaresolverr
    restart: unless-stopped
    dns_search: []
    environment:
      - LOG_LEVEL=info
      - TZ=${ARR_TZ}
    networks:
      - arr-internal

  # ── BOOTSTRAP — configure toutes les connexions API au démarrage ────
  arr-bootstrap:
    image: alpine:3.19
    container_name: arr-bootstrap
    restart: "no"
    dns_search: []
    command: ["/bin/sh", "-c", "printf 'nameserver 127.0.0.11\\noptions ndots:0\\n' > /etc/resolv.conf && apk add --no-cache curl bash jq python3 >/dev/null 2>&1 && bash /bootstrap.sh"]
    env_file: app.env
    volumes:
      - {{.BaseDir}}/app-config/arr-stack/bootstrap.sh:/bootstrap.sh:ro
      - {{.BaseDir}}/app-data/arr-stack/config/bazarr:/bazarr-config
      - {{.BaseDir}}/app-data/arr-stack/config/jellyseerr:/jellyseerr-config
    networks:
      - arr-internal
      - caleope-public
    depends_on:
      - prowlarr
      - radarr
      - sonarr
      - lidarr
      - bazarr
      - jellyseerr
      - arr-flaresolverr

  # ── JELLYFIN VUE — interface de lecture épurée (vue.domain) ─────────
  jellyfin-vue:
    image: ghcr.io/jellyfin/jellyfin-vue:unstable
    container_name: jellyfin-vue
    restart: unless-stopped
    dns_search: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin-vue.rule=Host(`vue.{{.Domain}}`)"
      - "traefik.http.routers.jellyfin-vue.entrypoints=web"
      - "traefik.http.routers.jellyfin-vue.priority=10"
      - "traefik.http.services.jellyfin-vue.loadbalancer.server.port=80"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public

networks:
  caleope-public:
    external: true
  arr-internal:
    driver: bridge
