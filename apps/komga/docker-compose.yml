services:
  komga:
    image: gotson/komga:latest
    container_name: komga
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - ${CALEOPE_BASE_DIR}/app-data/komga/config:/config
      - ${CALEOPE_BASE_DIR}/app-data/komga/comics:/comics
      - ${CALEOPE_BASE_DIR}/app-data/komga/mangas:/mangas
    ports:
      - "${CALEOPE_PORT_WEB}:25600"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.komga.rule=Host(`komga.${CALEOPE_DOMAIN}`)"
      - "traefik.http.routers.komga.entrypoints=websecure"
      - "traefik.http.routers.komga.tls=true"
      - "traefik.http.services.komga.loadbalancer.server.port=25600"
    restart: unless-stopped
