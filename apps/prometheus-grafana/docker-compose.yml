services:
  prometheus:
    image: prom/prometheus:latest
    container_name: caleope-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - {{.BaseDir}}/app-data/{{.AppID}}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - {{.BaseDir}}/app-data/{{.AppID}}/prometheus:/prometheus
    networks:
      - caleope-internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: caleope-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${CALEOPE_PORT_GRAFANA}:3000"
    environment:
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_PATHS_PROVISIONING=/var/lib/grafana/provisioning
    volumes:
      - {{.BaseDir}}/app-data/{{.AppID}}/grafana:/var/lib/grafana
    networks:
      - caleope-public
      - caleope-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`{{.Domain}}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

networks:
  caleope-public:
    external: true
  caleope-internal:
    external: true
