services:
  nextcloud-db:
    image: mariadb:11
    container_name: nextcloud-db
    restart: unless-stopped
    env_file:
      - {{$.BaseDir}}/app-config/nextcloud/secrets.env
    environment:
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    volumes:
      - {{$.BaseDir}}/app-data/nextcloud/db:/var/lib/mysql
    networks:
      - caleope-internal

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    volumes:
      - {{$.BaseDir}}/app-data/nextcloud/redis:/data
    networks:
      - caleope-internal

  nextcloud-onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: nextcloud-onlyoffice
    restart: unless-stopped
    env_file:
      - {{$.BaseDir}}/app-config/nextcloud/secrets.env
    volumes:
      - {{$.BaseDir}}/app-data/nextcloud/onlyoffice/logs:/var/log/onlyoffice
      - {{$.BaseDir}}/app-data/nextcloud/onlyoffice/data:/var/www/onlyoffice/Data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud-onlyoffice.rule=Host(`${ONLYOFFICE_DOMAIN}`)"
      - "traefik.http.routers.nextcloud-onlyoffice.entrypoints=web"
      - "traefik.http.services.nextcloud-onlyoffice.loadbalancer.server.port=80"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - caleope-internal

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    env_file:
      - {{$.BaseDir}}/app-config/nextcloud/secrets.env
    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - REDIS_HOST=nextcloud-redis
      - NEXTCLOUD_TRUSTED_DOMAINS={{.Domain}}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://{{.Domain}}
    ports:
      {{- range .Ports}}
      - "{{.Host}}:{{.Container}}"
      {{- end}}
    volumes:
      - {{$.BaseDir}}/app-data/nextcloud/html:/var/www/html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`{{.Domain}}`)"
      - "traefik.http.routers.nextcloud.entrypoints=web"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "traefik.docker.network=caleope-public"
    networks:
      - caleope-public
      - caleope-internal

  nextcloud-bootstrap:
    image: nextcloud:latest
    container_name: nextcloud-bootstrap
    restart: "no"
    entrypoint: ["/bin/bash", "/bootstrap.sh"]
    depends_on:
      - nextcloud
      - nextcloud-onlyoffice
    env_file:
      - {{$.BaseDir}}/app-config/nextcloud/secrets.env
    volumes:
      - {{$.BaseDir}}/app-data/nextcloud/html:/var/www/html
      - {{$.BaseDir}}/app-config/nextcloud/bootstrap.sh:/bootstrap.sh:ro
    networks:
      - caleope-internal

networks:
  caleope-public:
    external: true
  caleope-internal:
    external: true
