services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - ${CALEOPE_BASE_DIR}/app-config/navidrome/secrets.env
    ports:
      - "${CALEOPE_PORT_WEB}:4533"
    volumes:
      - ${CALEOPE_BASE_DIR}/app-data/navidrome/data:/data
      - ${CALEOPE_BASE_DIR}/app-data/navidrome/music:/music:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.navidrome.rule=Host(`${CALEOPE_DOMAIN}`)"
      - "traefik.http.routers.navidrome.entrypoints=websecure"
      - "traefik.http.routers.navidrome.tls=true"
      - "traefik.http.services.navidrome.loadbalancer.server.port=4533"
    networks:
      - caleope-public
      - caleope-internal

networks:
  caleope-public:
    external: true
  caleope-internal:
    external: true
