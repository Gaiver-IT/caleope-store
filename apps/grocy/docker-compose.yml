services:
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    container_name: grocy
    restart: unless-stopped
    env_file:
      - ${CALEOPE_BASE_DIR}/app-config/grocy/secrets.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    ports:
      - "${CALEOPE_PORT_WEB}:80"
    volumes:
      - ${CALEOPE_BASE_DIR}/app-data/grocy/data:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grocy.rule=Host(`${CALEOPE_DOMAIN}`)"
      - "traefik.http.routers.grocy.entrypoints=websecure"
      - "traefik.http.routers.grocy.tls=true"
      - "traefik.http.services.grocy.loadbalancer.server.port=80"
    networks:
      - caleope-public
      - caleope-internal

networks:
  caleope-public:
    external: true
  caleope-internal:
    external: true
