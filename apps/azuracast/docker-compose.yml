##
## AZURACAST — Serveur de radio en ligne
##
## Ports :
## • Web UI via Traefik        → azuracast.{{.Domain}} (HTTP sur port 80 du container)
## • Web UI accès direct       → port 8099 (géré par Caleope, visible dans `caleope list`)
## • Streaming Icecast (radio) → port 8500 par défaut (1 station)
##   Pour plusieurs stations, décommenter les ports 8505-8545 dans la section `ports` ci-dessous
##   et les ajouter dans les règles pare-feu.
##   Plage 8500+ choisie pour éviter les conflits avec les services courants (8000-8200).
## • SFTP (upload audio)       → port 2022
##

services:

  # ── AZURACAST — serveur radio tout-en-un ────────────────────────────
  azuracast:
    image: ghcr.io/azuracast/azuracast:${AZURACAST_VERSION:-latest}
    container_name: azuracast
    restart: unless-stopped
    env_file:
      - {{.BaseDir}}/app-config/azuracast/secrets.env
    volumes:
      - {{.BaseDir}}/app-data/azuracast/stations:/var/azuracast/stations
      - {{.BaseDir}}/app-data/azuracast/geoip:/var/azuracast/geoip
      - {{.BaseDir}}/app-data/azuracast/backups:/var/azuracast/backups
      - {{.BaseDir}}/app-data/azuracast/acme:/var/azuracast/acme
    ports:
      # Ports alloués dynamiquement par Caleope (visibles dans `caleope list`) :
      #   web     → host:dynamique → container:80  (UI admin)
      #   sftp    → host:dynamique → container:2022 (upload musique)
      #   icecast → host:dynamique → container:dynamique (Icecast configuré par bootstrap)
      # NOTE icecast : host=container obligatoire (Icecast annonce le port dans les URLs de flux).
      {{- range .Ports}}
      {{- if eq .Name "icecast"}}
      - "{{.Host}}:{{.Host}}"
      {{- else}}
      - "{{.Host}}:{{.Container}}"
      {{- end}}
      {{- end}}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.azuracast.rule=Host(`{{.Domain}}`)"
      - "traefik.http.routers.azuracast.entrypoints=websecure"
      - "traefik.http.routers.azuracast.tls=true"
      - "traefik.http.services.azuracast.loadbalancer.server.port=80"
      - "traefik.docker.network=caleope-public"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - caleope-public
      - azuracast-internal

  # ── BOOTSTRAP — configuration initiale (s'exécute une seule fois) ───
  azuracast-bootstrap:
    image: alpine:3.19
    container_name: azuracast-bootstrap
    restart: "no"
    env_file:
      - {{.BaseDir}}/app-config/azuracast/secrets.env
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl bash jq >/dev/null 2>&1 && bash /bootstrap.sh
    volumes:
      - {{.BaseDir}}/app-config/azuracast/bootstrap.sh:/bootstrap.sh:ro
    depends_on:
      - azuracast
    networks:
      - azuracast-internal

networks:
  caleope-public:
    external: true
  azuracast-internal:
    driver: bridge
